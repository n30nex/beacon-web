name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Validate production image contract
        run: npm run validate:production-image

      - name: Lint
        run: npm run lint

      - name: Performance budgets
        run: npm run perf:budget

      - name: Checkout pinned backend contracts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: n30nex/beacon-server
          ref: dev
          path: .contracts/beacon-server
          sparse-checkout: docs

      - name: Test
        env:
          BEACON_SERVER_ROOT: ${{ github.workspace }}/.contracts/beacon-server
        run: npm test

      - name: Install browser test dependencies
        run: npx playwright install --with-deps chromium

      - name: Browser and accessibility tests
        run: npm run test:e2e
