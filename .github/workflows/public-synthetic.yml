name: Public Synthetic

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

jobs:
  beacon:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check public Beacon routes and WebSocket
        run: node scripts/public-synthetic.mjs
