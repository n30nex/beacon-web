services:
  caddy:
    build:
      context: ./caddy
      args:
        CADDY_RATELIMIT_MODULE: ${CADDY_RATELIMIT_MODULE:-github.com/mholt/caddy-ratelimit@v0.1.0}
    image: ${CADDY_IMAGE:-beacon-caddy-ratelimit:2}
    ports:
      - "${CADDY_HTTP_PORT:-80}:${CADDY_HTTP_TARGET_PORT:-80}"
      - "${CADDY_HTTPS_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:${HOST_DOCKER_INTERNAL_IP:-host-gateway}"
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN environment variable is required}
      - BEACON_WEB_UPSTREAM=${BEACON_WEB_UPSTREAM:-host.docker.internal:5174}
      - BEACON_API_UPSTREAM=${BEACON_API_UPSTREAM:-host.docker.internal:8080}
      - BEACON_WS_UPSTREAM=${BEACON_WS_UPSTREAM:-host.docker.internal:8080}
      - CADDY_API_RATE_LIMIT_EVENTS=${CADDY_API_RATE_LIMIT_EVENTS:-600}
      - CADDY_API_RATE_LIMIT_WINDOW=${CADDY_API_RATE_LIMIT_WINDOW:-1m}
      - CADDY_HEALTH_RATE_LIMIT_EVENTS=${CADDY_HEALTH_RATE_LIMIT_EVENTS:-120}
      - CADDY_HEALTH_RATE_LIMIT_WINDOW=${CADDY_HEALTH_RATE_LIMIT_WINDOW:-1m}
      - CADDY_WS_RATE_LIMIT_EVENTS=${CADDY_WS_RATE_LIMIT_EVENTS:-60}
      - CADDY_WS_RATE_LIMIT_WINDOW=${CADDY_WS_RATE_LIMIT_WINDOW:-1m}
    volumes:
      - ./data/Caddy/CaddyFile/Caddyfile.proxy:/etc/caddy/Caddyfile
      - ./data/Caddy/data:/data/caddy/
      - ./data/Caddy/config:/config/caddy/
    restart: unless-stopped
